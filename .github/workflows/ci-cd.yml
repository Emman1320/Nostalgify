name: CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        id: image-names
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "backend=ghcr.io/${owner}/bingo-revamp-backend" >> "$GITHUB_OUTPUT"
          echo "nginx=ghcr.io/${owner}/bingo-revamp-nginx" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image-names.outputs.backend }}:${{ github.sha }}
            ${{ steps.image-names.outputs.backend }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/nginx/Dockerfile
          push: true
          tags: |
            ${{ steps.image-names.outputs.nginx }}:${{ github.sha }}
            ${{ steps.image-names.outputs.nginx }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy deployment bundle to EC2
        run: |
          ssh "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "mkdir -p '${{ secrets.EC2_APP_DIR }}'"
          scp -r docker-compose.prod.yml deploy \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:${{ secrets.EC2_APP_DIR }}/"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -eu
            cd "${{ secrets.EC2_APP_DIR }}"
            cat > .env <<EOF
            APP_DOMAIN=${{ secrets.APP_DOMAIN }}
            LETSENCRYPT_EMAIL=${{ secrets.LETSENCRYPT_EMAIL }}
            BACKEND_IMAGE=${{ steps.image-names.outputs.backend }}:${{ github.sha }}
            NGINX_IMAGE=${{ steps.image-names.outputs.nginx }}:${{ github.sha }}
            PORT=8000
            SOCKET_PORT=5000
            VALKEY_URL=redis://valkey:6379
            CORS_ORIGIN=https://${{ secrets.APP_DOMAIN }}
            EOF
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            chmod +x deploy/ec2/*.sh
            ./deploy/ec2/deploy.sh
